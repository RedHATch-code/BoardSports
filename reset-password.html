<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recupera o acesso à tua conta BoardSports com um link seguro de redefinicao de palavra-passe.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Recuperar Palavra-passe - BoardSports">
  <meta property="og:description" content="Recupera o acesso à tua conta BoardSports com um link seguro de redefinicao de palavra-passe.">
  <meta property="og:image" content="assets/images/boardsports-mix.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recuperar Palavra-passe - BoardSports">
  <meta name="twitter:description" content="Recupera o acesso à tua conta BoardSports.">
  <meta name="twitter:image" content="assets/images/boardsports-mix.jpg">
  <link rel="canonical" href="reset-password.html">
  <link rel="icon" type="image/png" href="assets/images/logotipo.png">
  <title>Recuperar Palavra-passe - BoardSports</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/floating-dock.css">
</head>
<body class="site-dock-auth">

<div class="auth-container">
  <div class="auth-card reset-card">
    <div class="auth-header reset-copy">
      <div class="auth-logo">
        <img src="assets/images/logotipo.png" alt="BoardSports Logo" class="auth-logo-image" width="76" height="76" loading="eager">
      </div>
      <h1>Nova palavra-passe</h1>
      <p id="reset-copy">Estamos a validar o link de recuperação antes de te deixar alterar a password.</p>
    </div>

    <div id="reset-state" class="reset-state">A preparar o formulário de recuperação...</div>

    <form id="reset-form" class="auth-form reset-form" hidden>
      <div class="form-group">
        <label for="new-password">Nova palavra-passe</label>
        <input
          id="new-password"
          type="password"
          autocomplete="new-password"
          placeholder="Minimo de 6 caracteres"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirmar palavra-passe</label>
        <input
          id="confirm-password"
          type="password"
          autocomplete="new-password"
          placeholder="Repete a nova palavra-passe"
          required
        >
      </div>

      <div class="reset-actions">
        <button type="submit" class="btn-primary" id="reset-submit">
          <span>Atualizar palavra-passe</span>
          <span class="btn-icon">-></span>
        </button>
        <button type="button" class="reset-secondary" id="reset-login">Voltar ao login</button>
      </div>

      <div id="msg" class="auth-message"></div>
    </form>
  </div>

  <div class="auth-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
</div>

<script type="module" src="js/reset-password.js"></script>
<script src="js/responsive.js"></script>
<script type="module" src="js/site_header.js"></script>

</body>
</html>
