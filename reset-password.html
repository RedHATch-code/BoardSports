<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoardSports - Recuperar Palavra-passe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/floating-dock.css">
  <style>
    .reset-card {
      display: grid;
      gap: 18px;
    }

    .reset-copy p {
      color: #b8b8b8;
      line-height: 1.6;
    }

    .reset-state {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #ededed;
      font-size: 14px;
      line-height: 1.6;
    }

    .reset-state.success {
      background: rgba(35, 116, 74, 0.18);
      color: #dcfce7;
    }

    .reset-state.error {
      background: rgba(153, 27, 27, 0.18);
      color: #fee2e2;
    }

    .reset-form[hidden] {
      display: none;
    }

    .reset-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .reset-secondary {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: #ededed;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body class="site-dock-auth">

<div class="auth-container">
  <div class="auth-card reset-card">
    <div class="auth-header reset-copy">
      <div class="auth-logo"></div>
      <h1>Nova palavra-passe</h1>
      <p id="reset-copy">Estamos a validar o link de recuperacao antes de te deixar alterar a password.</p>
    </div>

    <div id="reset-state" class="reset-state">A preparar o formulario de recuperacao...</div>

    <form id="reset-form" class="auth-form reset-form" hidden>
      <div class="form-group">
        <label for="new-password">Nova palavra-passe</label>
        <input
          id="new-password"
          type="password"
          autocomplete="new-password"
          placeholder="Minimo de 6 caracteres"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirmar palavra-passe</label>
        <input
          id="confirm-password"
          type="password"
          autocomplete="new-password"
          placeholder="Repete a nova palavra-passe"
          required
        >
      </div>

      <div class="reset-actions">
        <button type="submit" class="btn-primary" id="reset-submit">
          <span>Atualizar palavra-passe</span>
          <span class="btn-icon">-></span>
        </button>
        <button type="button" class="reset-secondary" id="reset-login">Voltar ao login</button>
      </div>

      <div id="msg" class="auth-message"></div>
    </form>
  </div>

  <div class="auth-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
</div>

<script type="module" src="js/reset-password.js"></script>
<script src="js/responsive.js"></script>
<script type="module" src="js/site_header.js"></script>

</body>
</html>
